{% extends "auth_base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<h2>Create Account</h2>
<form method="POST" action="{{ url_for('register') }}">
    <div class="form-grid" style="gap:12px;">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="you@company.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <div style="position:relative;">
                <input type="password" id="reg-password" name="password" placeholder="Min. 6 characters" required minlength="6">
                <button type="button" onclick="togglePassword('reg-password', this)"
                    style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="10-digit number" pattern="[0-9]{10}">
        </div>
        <div class="form-group" style="grid-column:1/-1;">
            <label>Role</label>
            <select name="role" required>
                <option value="" disabled selected>Select role</option>
                <option value="Site Manager">Site Manager</option>
                <option value="Engineer">Engineer</option>
                <option value="Supervisor">Supervisor</option>
                <option value="Foreman">Foreman</option>
                <option value="Safety Officer">Safety Officer</option>
                <option value="Accountant">Accountant</option>
                <option value="Admin">Admin</option>
            </select>
        </div>
    </div>
    <button type="submit" class="btn btn-primary mt-3" style="width:100%;justify-content:center;">
        <i class="fas fa-user-plus"></i> Create Account
    </button>
</form>
<p class="auth-link">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
{% endblock %}
